# golangci-lint configuration for fo (strict — modeled on trixi)
version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  tests: true

output:
  formats:
    text:
      print-linter-name: true
      print-issued-lines: true
      colors: true
    sarif:
      path: build/golangci.sarif

linters:
  enable:
    # Error handling
    - err113
    - errchkjson
    - errorlint
    - nilerr
    - nilnesserr

    # Safety
    - bodyclose
    - containedctx
    - forcetypeassert
    - gosec
    - noctx
    - predeclared

    # Complexity
    - cyclop
    - funlen
    - gocognit
    - gocyclo
    - nestif

    # Enum & type safety
    - exhaustive
    - makezero
    - musttag
    - reassign

    # Style & correctness
    - asciicheck
    - copyloopvar
    - dupword
    - durationcheck
    - errname
    - exptostd
    - fatcontext
    - gocheckcompilerdirectives
    - gochecknoinits
    - goconst
    - gocritic
    - grouper
    - inamedparam
    - intrange
    - iotamixing
    - misspell
    - modernize
    - nakedret
    - nilnil
    - nolintlint
    - prealloc
    - recvcheck
    - revive
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign

    # Performance
    - mirror
    - perfsprint

    # Testing
    - testifylint
    - thelper
    - usetesting

  disable:
    - godox
    - wsl

  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - fmt.Fprintf
        - fmt.Printf
        - fmt.Print
        - fmt.Println
        - fmt.Fprint
        - fmt.Fprintln
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - appendCombine
        - commentFormatting
        - deprecatedComment
        - hugeParam
        - ifElseChain
        - rangeValCopy
        - unlambda
    cyclop:
      max-complexity: 15
    funlen:
      lines: 80
      statements: 40
    gocognit:
      min-complexity: 15
    gocyclo:
      min-complexity: 15
    nestif:
      min-complexity: 5
    nakedret:
      max-func-lines: 20
    revive:
      severity: warning
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: bare-return
          disabled: true
        - name: var-naming
          disabled: false
        - name: context-as-argument
          disabled: false
        - name: error-return
          disabled: false
        - name: dot-imports
          disabled: false
        - name: waitgroup-by-value
          disabled: false
    gosec:
      excludes:
        - G104  # errcheck handles this
        - G304  # File inclusion (CLI tool reads stdin/paths)
        - G306  # Loose file perms ok for build/state outputs
    staticcheck:
      checks:
        - all
        - -SA1019  # deprecated warnings (transitions)
        - -ST1000
        - -ST1020
        - -ST1022
    testifylint:
      enable-all: true
    nolintlint:
      require-explanation: true
      require-specific: true
    goconst:
      min-occurrences: 4

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Tests: relax security, complexity, ctx, unparam
      - linters: [gosec]
        path: _test\.go
      - linters: [cyclop, funlen, gocognit, gocyclo, nestif]
        path: _test\.go
      - linters: [noctx]
        path: _test\.go
      - linters: [unparam]
        path: _test\.go
      - linters: [errcheck]
        path: _test\.go
        text: Close
      - linters: [usetesting]
        path: _test\.go
      - linters: [revive]
        path: _test\.go
        text: unused-parameter
      # CLI main.go: relax complexity, allow gosec process exec
      - linters: [cyclop, funlen, gocognit, gocyclo, nestif]
        path: cmd/.*/main\.go
      - linters: [gocritic]
        path: cmd/.*/main\.go
        text: exitAfterDefer
      - linters: [gosec]
        path: cmd/.*
        text: G204|G301|G302|G306
      # Comment dupword (e.g. "the the" inside doc lines from prose)
      - linters: [dupword]
        source: "^\\s*//"
    paths:
      - third_party$
      - examples$

formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - examples$
